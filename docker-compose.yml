services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatuser
      POSTGRES_PASSWORD: chatpass
      POSTGRES_DB: chatdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatuser -d chatdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    expose:
      - "3000"
    volumes:
      - uploads_data:/uploads
      - ./widget/dist:/widget-dist:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - default
      - caddy_net

volumes:
  postgres_data:
  uploads_data:

networks:
  default:
  caddy_net:
    external: true
    name: ob-inventory_default
